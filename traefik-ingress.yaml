apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rocketchat-ingress
  namespace: chat-production
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # CONFIGURAÇÃO AVANÇADA: Sticky Sessions para manter o socket do chat
    traefik.ingress.kubernetes.io/affinity: "true"
    traefik.ingress.kubernetes.io/session-cookie-name: "rocketchat-sticky-sess"
spec:
  tls:
  - hosts:
    - chat.dominio-da-empresa.com.br
    secretName: rocketchat-tls-secret
  rules:
  - host: chat.dominio-da-empresa.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rocketchat-service
            port:
              number: 3000